<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Force Sync - FoodSync ERP</title>
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #F3F4F6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 600px; width: 90%; }
        h1 { color: #111827; font-size: 22px; margin-bottom: 8px; }
        p { color: #6B7280; margin-bottom: 24px; font-size: 14px; line-height: 1.6; }
        .btn { border: none; padding: 14px 28px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; margin: 6px; display: inline-block; }
        .btn-upload { background: #2563EB; color: white; }
        .btn-upload:hover { background: #1D4ED8; }
        .btn-download { background: #059669; color: white; }
        .btn-download:hover { background: #047857; }
        .btn-debug { background: #7C3AED; color: white; font-size: 13px; padding: 10px 20px; }
        .btn-debug:hover { background: #6D28D9; }
        #log { text-align: left; background: #1F2937; color: #10B981; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 400px; overflow-y: auto; margin-top: 20px; display: none; white-space: pre-wrap; word-break: break-all; }
        .key-count { background: #DBEAFE; color: #1D4ED8; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; display: inline-block; margin: 8px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔄 Force Sync Data</h1>
        <p>
            <strong>Upload:</strong> Kirim SEMUA data dari laptop INI ke Firebase Cloud.<br>
            <strong>Download:</strong> Tarik SEMUA data dari Firebase ke laptop INI.
        </p>
        <div id="localInfo"></div>
        <div style="margin: 20px 0;">
            <button class="btn btn-upload" id="btnUpload">⬆️ Upload ke Cloud</button>
            <button class="btn btn-download" id="btnDownload">⬇️ Download dari Cloud</button>
        </div>
        <button class="btn btn-debug" id="btnDebug">🔍 Cek Data di Firebase</button>
        <div id="log"></div>
    </div>

    <script>
        var FIREBASE_URL = 'https://foodsyncerp-default-rtdb.asia-southeast1.firebasedatabase.app/foodsync-erp';
        
        // Key yang TIDAK boleh di-sync
        var EXCLUDED_KEYS = [
            'user_name', 'user_role', 'user_email', 'auth_token', 'user_photo',
            'foodsync_initial_sync_done', 'foodsync_is_cleared', 'last_wipe',
            'foodsync_session_synced', 'foodsync_last_sync_ts', 'foodsync_preloaded'
        ];

        // Karakter yang TIDAK boleh ada di Firebase key
        function isValidFirebaseKey(key) {
            return !/[.$#\[\]\/:]/.test(key) && key !== '' && key.indexOf('firebase') !== 0;
        }

        function isExcluded(key) {
            return EXCLUDED_KEYS.indexOf(key) !== -1 || 
                   key === 'force_wipe' || 
                   key === '_last_updated' ||
                   !isValidFirebaseKey(key);
        }

        var logEl = document.getElementById('log');
        function log(msg) {
            logEl.style.display = 'block';
            logEl.textContent += msg + '\n';
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Show local data info
        (function() {
            var count = 0;
            var keys = [];
            for (var i = 0; i < localStorage.length; i++) {
                var k = localStorage.key(i);
                if (!isExcluded(k)) {
                    count++;
                    keys.push(k);
                }
            }
            document.getElementById('localInfo').innerHTML = 
                '<div class="key-count">Data lokal yang valid: ' + count + ' key</div><br>' +
                '<span style="font-size:11px;color:#9CA3AF;">' + keys.join(', ') + '</span>';
        })();

        // UPLOAD: satu per satu agar key ilegal tidak menggagalkan semua
        document.getElementById('btnUpload').addEventListener('click', async function() {
            if (!confirm('Upload SEMUA data dari laptop ini ke Cloud?\nData di Cloud akan DITIMPA.')) return;
            
            log('=== MULAI UPLOAD (satu per satu) ===');
            
            var successCount = 0;
            var failCount = 0;
            
            for (var i = 0; i < localStorage.length; i++) {
                var k = localStorage.key(i);
                if (isExcluded(k)) continue;
                
                var val = localStorage.getItem(k);
                var jsonVal;
                try { jsonVal = JSON.parse(val); } catch(e) { jsonVal = val; }
                
                try {
                    var resp = await fetch(FIREBASE_URL + '/' + encodeURIComponent(k) + '.json', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(jsonVal)
                    });
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    successCount++;
                    log('✅ ' + k + ' (' + val.length + ' bytes)');
                } catch(err) {
                    failCount++;
                    log('❌ ' + k + ' - ' + err.message);
                }
            }
            
            // Update timestamp
            try {
                await fetch(FIREBASE_URL + '/_last_updated.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(Date.now())
                });
            } catch(e) {}
            
            log('\n🎉 SELESAI! ' + successCount + ' berhasil, ' + failCount + ' gagal.');
            if (successCount > 0) {
                log('Sekarang buka laptop lain dan klik Download.');
            }
            sessionStorage.removeItem('foodsync_preloaded');
            sessionStorage.removeItem('foodsync_session_synced');
        });

        // DOWNLOAD
        document.getElementById('btnDownload').addEventListener('click', function() {
            if (!confirm('Download SEMUA data dari Cloud?\nData lokal akan DITIMPA.')) return;
            
            log('=== MULAI DOWNLOAD ===');
            
            fetch(FIREBASE_URL + '.json')
            .then(function(resp) {
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                return resp.json();
            })
            .then(function(data) {
                if (!data) {
                    log('❌ Firebase KOSONG!');
                    return;
                }
                
                var count = 0;
                Object.keys(data).forEach(function(key) {
                    if (isExcluded(key)) return;
                    
                    var val = data[key];
                    // Fix Firebase array → object conversion
                    if (val && typeof val === 'object' && !Array.isArray(val)) {
                        var objKeys = Object.keys(val);
                        if (objKeys.length > 0 && objKeys.every(function(k) { return !isNaN(k); })) {
                            val = Object.values(val);
                        }
                    }
                    
                    localStorage.setItem(key, JSON.stringify(val));
                    count++;
                    log('✅ ' + key);
                });
                
                sessionStorage.removeItem('foodsync_preloaded');
                sessionStorage.removeItem('foodsync_session_synced');
                
                log('\n🎉 SELESAI! ' + count + ' key didownload.');
                log('Refresh halaman ERP untuk melihat data terbaru.');
            })
            .catch(function(err) {
                log('❌ GAGAL: ' + err.message);
            });
        });

        // DEBUG
        document.getElementById('btnDebug').addEventListener('click', function() {
            log('=== CEK DATA DI FIREBASE ===');
            
            fetch(FIREBASE_URL + '.json')
            .then(function(resp) { return resp.json(); })
            .then(function(data) {
                if (!data) { log('Firebase KOSONG!'); return; }
                var keys = Object.keys(data);
                log('Total key: ' + keys.length);
                keys.forEach(function(k) {
                    var val = data[k];
                    var size = JSON.stringify(val).length;
                    var preview = '';
                    if (Array.isArray(val)) preview = ' [Array, ' + val.length + ' items]';
                    else if (typeof val === 'object' && val !== null) preview = ' {Object, ' + Object.keys(val).length + ' keys}';
                    else preview = ' = ' + String(val).substring(0, 80);
                    log('  📌 ' + k + ' (' + size + ' bytes)' + preview);
                });
            })
            .catch(function(err) { log('❌ ' + err.message); });
        });
    </script>
</body>
</html>
