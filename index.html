<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - FoodSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* Toast notification */
    .toast {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 9999;
      padding: 16px 28px;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 0.4s, transform 0.4s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast.success { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .toast.error   { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .toast.loading { background: linear-gradient(135deg, #3b82f6, #2563eb); }
  </style>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      height: 100%;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('gedung3.png');
      background-size: cover;
      background-position: center;
      z-index: -1;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(14, 55, 107, 0.75);
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .main-card {
      background: #ffffff;
      border-radius: 40px;
      display: flex;
      padding: 15px;
      width: 100%;
      max-width: 950px;
      height: 600px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
    }

    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 20px;
    }

    .right-panel {
      flex: 1;
      background-image: url('gedung3.png');
      background-size: cover;
      background-position: center;
      border-radius: 35px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .header-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .title {
      font-size: 38px;
      font-weight: 800;
      color: #0b3f8a;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 15px;
      font-weight: 500;
      color: #0b3f8a;
    }

    .form-wrapper {
      width: 80%;
      max-width: 340px;
      margin: 0 auto;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #000;
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      height: 46px;
      border: 1.5px solid #2e8af6;
      border-radius: 12px;
      padding: 0 16px;
      font-size: 14px;
      color: #333;
      outline: none;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s;
    }

    .form-control::placeholder {
      color: #9ab3cf;
    }

    .form-control:focus {
      border-color: #0b3f8a;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 35px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      font-size: 12px;
      font-weight: 500;
      color: #000;
      cursor: pointer;
    }

    .checkbox-label input {
      margin-right: 8px;
      accent-color: #2e8af6;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 11px;
      color: #8c9baf;
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-submit {
      width: 100%;
      height: 48px;
      background-color: #0b3f8a;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .btn-submit:hover {
      background-color: #082d66;
      transform: translateY(-1px);
    }

    .glass-card {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 35px;
      padding: 50px 40px;
      width: 340px;
      text-align: center;
      color: #fff;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass-title {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 5px;
      line-height: 1.2;
    }

    .glass-subtitle {
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 50px;
      color: #e2e8f0;
    }

    .glass-text {
      font-size: 12px;
      color: #a7c5eb;
      margin-bottom: 12px;
    }

    .btn-register {
      width: 100%;
      height: 46px;
      background-color: #0076f5;
      color: #fff;
      border: none;
      border-radius: 23px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .btn-register:hover {
      background-color: #005ec3;
      transform: translateY(-1px);
    }

    @media (max-width: 800px) {
      .main-card {
        flex-direction: column;
        height: auto;
        border-radius: 30px;
      }

      .right-panel {
        display: none;
        /* Hide right panel on small screens */
      }

      .left-panel {
        padding: 50px 20px;
      }
    }
  </style>

<script>
  (function() {
    var photo = sessionStorage.getItem('user_photo') || localStorage.getItem('user_photo');
    if (photo) {
      document.write('<style id="anti-flicker-avatar">');
      document.write('.user-avatar { background-image: url(' + photo + '); background-size: cover; background-position: center; }');
      document.write('.user-avatar i { display: none; }');
      document.write('.pd-avatar { background-image: url(' + photo + '); background-size: cover; background-position: center; }');
      document.write('.pd-avatar i { display: none; }');
      document.write('.big-avatar { background-image: url(' + photo + ') !important; background-size: cover !important; }');
      document.write('</style>');
    }
  })();
</script>
</head>

<body>
<script src="js/firebase-preload.js?v=1"></script>


  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <div class="page-wrapper">
    <div class="main-card">
      <div class="left-panel">
        <div class="header-section">
          <h1 class="title">Sign In</h1>
          <p class="subtitle">Please enter your details</p>
        </div>

        <div class="form-wrapper">
          <form id="signinForm">
            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input type="email" id="email" class="form-control" placeholder="E.g. nayla.mardhiyah24@mhs.uinjkt.ac.id"
                required>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input type="password" id="password" class="form-control" placeholder="E.g. nayla.mardhiyah24" required>
            </div>

            <div class="options">
              <label class="checkbox-label">
                <input type="checkbox" checked>
                Remember log in activity
              </label>
              <a href="#" class="forgot-link">forgot password?</a>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
          </form>
        </div>
      </div>

      <div class="right-panel">
        <div class="glass-card">
          <h2 class="glass-title">Hey,<br>Welcome Back!</h2>
          <p class="glass-subtitle">We hope you had a great day</p>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // Toast helper
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => { toast.className = 'toast'; }, 3500);
    }

    // Mock Database Akun
    const mockUsers = [
      { email: 'admin@foodsync.com', password: 'admin123', role: 'superadmin', name: 'Super Admin' },
      { email: 'sales@foodsync.com', password: 'sales123', role: 'sales', name: 'Sales Team' },
      { email: 'finance@foodsync.com', password: 'finance123', role: 'finance', name: 'Finance Team' },
      { email: 'hr@foodsync.com', password: 'hr123', role: 'hr', name: 'HR Team' },
      { email: 'production@foodsync.com', password: 'prod123', role: 'production', name: 'Production Team' },
      { email: 'inventory@foodsync.com', password: 'inv123', role: 'inventory', name: 'Inventory Team' },
      { email: 'purchasing@foodsync.com', password: 'purch123', role: 'purchasing', name: 'Purchasing Team' }
    ];

    document.getElementById('signinForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = this.querySelector('.btn-submit');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing In...';
      showToast('⏳ Memeriksa kredensial...', 'loading');

      // Simulasi proses login
      setTimeout(() => {
        // Cari user yang cocok
        const user = mockUsers.find(u => u.email === email && u.password === password);

        if (user) {
          // Menghapus data dari localStorage agar tidak mengganggu multi-tab
          ['user_name', 'user_role', 'user_email', 'auth_token', 'user_photo', 'isLoggedIn'].forEach(key => localStorage.removeItem(key));
          
          // Menyimpan session HANYA di sessionStorage agar multi-tab bisa pakai beda akun
          sessionStorage.setItem('user_name', user.name);
          sessionStorage.setItem('user_role', user.role);
          sessionStorage.setItem('user_email', user.email);
          sessionStorage.setItem('auth_token', 'true');
          if (user.photo) sessionStorage.setItem('user_photo', user.photo);
          showToast('✅ Login berhasil! Mengarahkan...', 'success');
          
          setTimeout(() => {
            window.location.href = 'modules.html';
          }, 1000);
        } else {
          // Login Gagal
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
          showToast('❌ Email atau password salah. Coba lagi.', 'error');
        }
      }, 1000);
    });
  </script>
<script type="module" src="js/firebase-sync.js?v=10"></script>
</body>

</html>
